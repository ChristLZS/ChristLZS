# 放到 .github/workflows/snake.yml
name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"   # 每天 0 点更新一次
  workflow_dispatch:        # 也支持手动触发
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ChristLZS
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=b5179e&color_dots=#1b1b2f,#3a0ca3,#7209b7,#b5179e,#f72585

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
